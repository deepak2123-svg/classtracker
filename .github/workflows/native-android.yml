name: Web and native Android checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  native-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Build, test, and lint native beta
        working-directory: native-android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleBetaDebug test :app:lintBetaDebug

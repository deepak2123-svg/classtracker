<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="ClassLog — Academic class tracker for teachers" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>ClassLog</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --forest:    #152B22;
        --forest-s:  #1E3D2F;
        --green:     #1B8A4C;
        --green-v:   #34D077;
        --green-l:   #E8F8EF;
        --green-m:   #6FCF97;
        --bg:        #F7F8F6;
        --surface:   #FFFFFF;
        --border:    #E6EAE8;
        --border-m:  #C8D4CE;
        --text:      #0E1F18;
        --text-s:    #2D4039;
        --text-m:    #5C7268;
        --text-l:    #94ADA5;
        --red:       #C93030;
        --red-l:     #FDF1F1;
        --navy:      #0E1F18;
        --shadow-sm: 0 1px 3px rgba(14,31,24,0.06), 0 1px 2px rgba(14,31,24,0.04);
        --shadow-md: 0 4px 12px rgba(14,31,24,0.08), 0 2px 4px rgba(14,31,24,0.04);
        --shadow-lg: 0 12px 32px rgba(14,31,24,0.12), 0 4px 8px rgba(14,31,24,0.06);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
      }

      html { font-size: 16px; }
      body {
        background: var(--bg);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }

      /* ── Ripple ── */
      .rw {
        position: absolute; border-radius: 50%;
        background: rgba(255,255,255,0.3);
        transform: scale(0); pointer-events: none;
        animation: rw-anim 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .rw.dark { background: rgba(14,31,24,0.07); }
      .rw.white { background: rgba(255,255,255,0.3); }
      @keyframes rw-anim { to { transform: scale(2.8); opacity: 0; } }

      /* ── Buttons feel ── */
      button {
        transition: transform 0.12s cubic-bezier(0.4,0,0.2,1),
                    box-shadow 0.12s, opacity 0.12s;
        cursor: pointer;
      }
      button:active { transform: scale(0.97); }
      button:disabled { cursor: not-allowed; opacity: 0.5; }

      /* ── Inputs ── */
      input, textarea, select {
        font-family: 'Plus Jakarta Sans', sans-serif;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--green) !important;
        box-shadow: 0 0 0 3px rgba(27,138,76,0.14);
      }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-m); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-l); }

      /* ── Card hover ── */
      .card-hover {
        transition: box-shadow 0.2s, transform 0.2s;
      }
      .card-hover:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      /* ── Page animation ── */
      @keyframes page-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: none; }
      }
      #root > div {
        animation: page-in 0.24s cubic-bezier(0.4,0,0.2,1);
      }

      /* ── Stagger animation for cards ── */
      @keyframes card-in {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: none; }
      }
      .card-in { animation: card-in 0.3s cubic-bezier(0.4,0,0.2,1) both; }
      .card-in:nth-child(1) { animation-delay: 0ms; }
      .card-in:nth-child(2) { animation-delay: 60ms; }
      .card-in:nth-child(3) { animation-delay: 120ms; }
      .card-in:nth-child(4) { animation-delay: 180ms; }
      .card-in:nth-child(5) { animation-delay: 240ms; }

      /* ── Date Carousel ── */
      .strip-wrap {
        background: #fff;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        position: relative;
      }
      .strip-wrap::before,
      .strip-wrap::after {
        content: '';
        position: absolute; top: 0; bottom: 0;
        width: 60px; z-index: 2; pointer-events: none;
      }
      .strip-wrap::before { left: 0;  background: linear-gradient(to right, rgba(255,255,255,1) 30%, transparent); }
      .strip-wrap::after  { right: 0; background: linear-gradient(to left,  rgba(255,255,255,1) 30%, transparent); }
      .strip-track {
        display: flex; gap: 2px;
        overflow-x: auto; padding: 10px 60px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none; -ms-overflow-style: none;
        cursor: grab;
      }
      .strip-track:active { cursor: grabbing; }
      @media (max-width: 767px) {
        /* Full-page forms no side padding collapse */
        .form-page { padding: 16px 16px 60px !important; }
        .strip-track { padding: 8px 20px; }
        .dc { width: 66px !important; }
        .dc-num { font-size: 22px !important; }
        .dc-day { font-size: 10px !important; }
      }
      .strip-track::-webkit-scrollbar { display: none; }
      .dc {
        flex-shrink: 0; width: 80px;
        display: flex; flex-direction: column;
        align-items: center; padding: 12px 6px 11px;
        border-radius: 12px; cursor: pointer;
        transition: background 0.15s, transform 0.12s;
        user-select: none; -webkit-user-select: none;
      }
      .dc:hover:not(.dc-sel) { background: var(--green-l); }
      .dc:active { transform: scale(0.96); }
      .dc.dc-sel {
        background: var(--forest);
        box-shadow: 0 4px 18px rgba(21,43,34,0.28);
      }
      .dc.dc-sun:not(.dc-sel) .dc-day { color: var(--red); }
      .dc.dc-sun:not(.dc-sel) .dc-num { color: var(--red); }
      .dc.dc-dim { opacity: 0.3; pointer-events: none; }
      .dc-day {
        font-size: 11px; font-weight: 600;
        color: var(--text-m); letter-spacing: 0.3px;
        margin-bottom: 7px; text-transform: uppercase;
      }
      .dc-sel .dc-day { color: rgba(255,255,255,0.5); }
      .dc-num {
        font-size: 28px; font-weight: 800;
        font-family: 'Syne', sans-serif;
        color: var(--text); line-height: 1;
      }
      .dc-sel .dc-num { color: #fff; }
      .dc-today {
        font-size: 9px; font-weight: 700;
        letter-spacing: 1px; text-transform: uppercase;
        color: rgba(255,255,255,0.55); margin-top: 5px;
      }
      .dc-area {
        height: 20px;
        display: flex; align-items: center; justify-content: center;
        margin-top: 6px;
      }
      .dc-empty {
        width: 7px; height: 7px; border-radius: 50%;
        border: 1.5px solid var(--border-m);
        background: transparent;
      }
      .dc-sel .dc-empty { border-color: rgba(255,255,255,0.3); }
      .dc-badge {
        min-width: 18px; height: 18px; border-radius: 20px;
        background: var(--green); color: #fff;
        font-size: 10px; font-weight: 700;
        font-family: 'Plus Jakarta Sans', sans-serif;
        display: flex; align-items: center; justify-content: center;
        padding: 0 5px; letter-spacing: -0.3px;
      }
      .dc-sel .dc-badge { background: #34D077; color: var(--forest); }

      /* ── Badges ── */
      .badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 5px 13px; border-radius: 20px;
        font-size: 13px; font-weight: 600; white-space: nowrap;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .badge-green { background: var(--green-l); color: var(--green); }
      .badge-session { background: var(--green-l); color: var(--green); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; }
      .badge-red { background: var(--red-l); color: var(--red); }

      /* ── Headings ── */
      h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; }

            /* ══════════════════════════════════════════════════
         RESPONSIVE — Phone (≤767px) · Tablet (768–1023px)
      ══════════════════════════════════════════════════ */

      /* Utility classes */
      .mobile-only   { display: none !important; }
      .desktop-only  { display: flex  !important; }
      .tablet-hidden { display: flex  !important; }

      /* ── Phone ────────────────────────────────────────── */
      @media (max-width: 767px) {
        .mobile-only   { display: flex  !important; }
        .desktop-only  { display: none  !important; }
        .tablet-hidden { display: none  !important; }

        /* Spacing */
        .mobile-pad    { padding-left: 14px !important; padding-right: 14px !important; }
        .mobile-pad-sm { padding: 10px 14px !important; }

        /* Nav */
        .nav-teacher-name { display: none !important; }
        .greeting-name    { font-size: 22px !important; }

        /* Home grid — single column */
        .class-grid {
          grid-template-columns: 1fr !important;
          gap: 12px !important;
        }

        /* Class view — stack panels */
        .class-view-body {
          flex-direction: column !important;
          padding: 10px 14px 80px !important;
          gap: 0 !important;
        }
        .class-switcher-sidebar { display: none !important; }
        .timeline-sidebar       { display: none !important; }

        /* Date strip */
        .strip-track { padding: 8px 16px !important; }
        .dc          { width: 62px !important; }
        .dc-num      { font-size: 21px !important; }
        .dc-day      { font-size: 10px !important; }

        /* Class header stat boxes */
        .stat-box { padding: 7px 11px !important; }

        /* Add entry row — stack on mobile */
        .add-entry-row {
          flex-direction: column !important;
          align-items: stretch !important;
          gap: 8px !important;
        }
        .add-entry-row button {
          width: 100% !important;
          justify-content: center !important;
        }

        /* Modals */
        .modal-card {
          border-radius: 16px !important;
          padding: 20px 16px !important;
          margin: 0 8px !important;
          max-height: 90vh;
          overflow-y: auto;
        }

        /* Trash rows */
        .trash-row      { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
        .trash-row-btns { width: 100% !important; flex-direction: row !important; }

        /* Forms */
        .form-card { padding: 16px 14px !important; }

        /* Prevent iOS input zoom */
        input, textarea, select { font-size: 16px !important; }

        /* Touch targets */
        button { min-height: 42px; }

        /* Class header on mobile — collapse stat boxes */
        .class-header-stats { display: none !important; }
        .class-header-inner { flex-wrap: wrap !important; gap: 10px !important; }
      }

      /* ── Tablet (768–1023px) ─────────────────────────── */
      @media (min-width: 768px) and (max-width: 1023px) {
        .class-grid {
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 14px !important;
        }
        .class-view-body {
          padding: 16px 20px 60px !important;
          gap: 16px !important;
        }
        /* Hide only timeline on tablet */
        .timeline-sidebar { display: none !important; }
        .class-switcher-sidebar { display: flex !important; flex-direction: column !important; width: 180px !important; }

        /* Strip slightly smaller */
        .dc     { width: 72px !important; }
        .dc-num { font-size: 24px !important; }

        /* Admin panels on tablet — allow horizontal scroll */
        .admin-panels { overflow-x: auto !important; }
      }

      /* ── Admin panel mobile steps ─────────────────────── */
      @media (max-width: 767px) {
        .admin-panels { flex-direction: column !important; overflow: hidden !important; }
        .admin-side-panel { width: 100% !important; border-right: none !important; border-bottom: 1px solid rgba(14,31,24,0.08) !important; max-height: 260px !important; }
        .admin-p4 { flex: 1 !important; min-height: 0 !important; }
        .admin-mobile-back { display: flex !important; }

        /* Step visibility */
        .admin-mobile-step-0 .admin-p2,
        .admin-mobile-step-0 .admin-p3,
        .admin-mobile-step-0 .admin-p4 { display: none !important; }
        .admin-mobile-step-1 .admin-p1,
        .admin-mobile-step-1 .admin-p3,
        .admin-mobile-step-1 .admin-p4 { display: none !important; }
        .admin-mobile-step-2 .admin-p1,
        .admin-mobile-step-2 .admin-p2,
        .admin-mobile-step-2 .admin-p4 { display: none !important; }
        .admin-mobile-step-3 .admin-p1,
        .admin-mobile-step-3 .admin-p2,
        .admin-mobile-step-3 .admin-p3 { display: none !important; }

        .admin-stats { flex-wrap: wrap !important; gap: 8px 16px !important; padding: 8px 14px !important; }
      }

      @media (min-width: 768px) {
        .admin-mobile-back { display: none !important; }
      }
      .admin-mobile-back { display: none; }

      /* ── Desktop-only  ───────────────────────────────── */
      @media (min-width: 768px) {
        .desktop-only { display: flex !important; }
      }

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

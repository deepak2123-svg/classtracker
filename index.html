<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Track your classes and daily notes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>ClassLog</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F5F6F8; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

      .rw {
        position: absolute; border-radius: 50%;
        background: rgba(255,255,255,0.25);
        transform: scale(0); pointer-events: none;
        animation: rx 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .rw.dark { background: rgba(17,24,39,0.07); }
      .rw.white { background: rgba(255,255,255,0.25); }
      @keyframes rx { to { transform: scale(3); opacity: 0; } }

      button { transition: transform 0.1s cubic-bezier(0.4,0,0.2,1); }
      button:active { transform: scale(0.97); }

      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: #16A34A !important;
        box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
      }

      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-thumb { background: #C8D4D0; border-radius: 4px; }

      @keyframes page-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
      #root > div { animation: page-in 0.2s cubic-bezier(0.4,0,0.2,1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
